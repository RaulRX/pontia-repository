name: Workflow demo dispatch
on:
  Workflow_dispatch:
    inputs:
      name:
        description: "Nombre"
        required: true
      surname:
        description: "Apellidos"
        required: true
jobs:
  console_printing:
    runs-on: ubuntu-latest
    steps:
      - name: Print full name in console
        env:
          FULL_NAME: ${{ name + surname}}
        runs: echo $FULL_NAME
